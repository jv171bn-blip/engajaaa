<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Limite Atingido · Engaja+</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="./styles/limite.css">
</head>
<body>
  <canvas id="matrix-canvas" class="bg-canvas"></canvas>
  <main>
    <section id="limitScreen" class="limit-screen">
      <div class="limit-wrap">
        <div class="limit-header">
          <h2 class="limit-title">
            <span class="limit-icon">⚠️</span>
            <span class="limit-text">Limite Atingido</span>
          </h2>
        </div>
        <div class="limit-profile">
          <div class="limit-avatar">
            <img id="limitAvatarImg" src="" alt="Perfil" style="display: none;">
            <div class="limit-avatar-placeholder">
              @
            </div>
          </div>
          <div class="limit-handle" id="limitUsername"></div>
        </div>
        <div class="limit-subtitle" id="limitSubtitle">Você já utilizou sua pesquisa gratuita</div>
        <div class="limit-message">Adquira o acesso completo e continue analisando perfis sem limites!</div>
        <a id="limitCta" class="limit-cta" href="../checkout/index.html">
          <span class="limit-cta-icon">🔓</span>
          <span class="limit-cta-text">Desbloquear Acesso Completo</span>
        </a>
      </div>
    </section>
  </main>
  <script>window.engajaMatrix = true;</script>
  <script src="../assets/js/matrix.obf.js"></script>
  <script src="./script/limite.js"></script>
</body>
</html>
